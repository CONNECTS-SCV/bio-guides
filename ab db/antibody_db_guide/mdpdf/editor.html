<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → PDF 에디터</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="/assets/preview.css">

<style>
  :root{ --ui:#2E5496; --ui-d:#1F3864; --bg:#f4f6f9; --bd:#dde3ea; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; font-family:'Noto Sans KR','Malgun Gothic',sans-serif; background:var(--bg); }
  #app{ display:flex; flex-direction:column; height:100vh; }

  header{ background:var(--ui-d); color:#fff; padding:8px 12px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  header .title{ font-weight:700; font-size:15px; margin-right:8px; }
  header .sep{ width:1px; height:22px; background:#ffffff33; margin:0 4px; }
  header button, header label.btn{ background:#ffffff1a; color:#fff; border:1px solid #ffffff33; border-radius:6px; padding:5px 10px; font-size:12.5px; cursor:pointer; white-space:nowrap; }
  header button:hover, header label.btn:hover{ background:#ffffff33; }
  header button.go{ background:#34c759; border-color:#34c759; font-weight:700; }
  header button.go:hover{ background:#2ea64c; }
  header .grow{ flex:1; }
  input[type=file]{ display:none; }

  main{ flex:1; display:flex; min-height:0; }

  /* 좌측 마크다운 원본 (우측 뷰어와 50:50) */
  #srcPane{ display:flex; flex-direction:column; flex:1 1 0; min-width:0; border-right:1px solid var(--bd); background:#fff; }
  #srcPane.hidden{ display:none; }
  .pane-label{ font-size:11px; color:#7a8290; padding:5px 12px; background:#eef2f7; border-bottom:1px solid var(--bd); }
  #src{ flex:1; border:none; resize:none; outline:none; padding:14px 16px;
        font-family:'Noto Sans Mono CJK KR','D2Coding','Consolas',monospace; font-size:13px; line-height:1.65;
        color:#24292e; white-space:pre-wrap; word-break:break-word; overflow-y:auto; tab-size:2; }

  /* 우측 뷰어 */
  #viewPane{ flex:1 1 0; min-width:0; display:flex; flex-direction:column; }
  #viewWrap{ flex:1; min-height:0; overflow:auto; position:relative; zoom:var(--prev-zoom,1); }
  #preview .toastui-editor-contents [data-line]{ cursor:pointer; }
  #preview .toastui-editor-contents [data-line].sel-blk{ outline:2px solid #2E5496; outline-offset:2px; border-radius:3px; box-shadow:0 0 0 4px rgba(46,84,150,.10); }
  /* 수동 페이지 나눔 마커 — 뷰어에서만 보임(export CSS엔 없음 → PDF엔 break만 깔끔히 적용). 클릭하면 삭제 */
  #preview .toastui-editor-contents .pagebreak{ height:0; margin:18px 0; border:0; border-top:2px dashed #c0398a; position:relative; cursor:pointer; user-select:none; }
  #preview .toastui-editor-contents .pagebreak::after{ content:'✂ 페이지 나눔 · 클릭해 삭제'; position:absolute; right:6px; top:-9px; background:#fff; color:#c0398a; font-size:10px; line-height:16px; padding:0 7px; border:1px solid #e7b8d6; border-radius:9px; }

  /* A4 페이지 보기 — JS(paginate)가 시트 그라디언트 배경·패딩·스페이서를 넣어 실제 PDF와 동일하게 쪽 분할 */
  body.page-view #viewWrap{ background:#8d96a0; padding:22px 0; }
  body.page-view #preview{ width:var(--page-w,210mm); margin:0 auto; position:relative; }
  body.page-view #preview > .toastui-editor-contents{
    width:100%; box-sizing:border-box; position:relative; background:#fff;
    box-shadow:0 0 0 1px rgba(0,0,0,.18);
  }
  .pglabel{ position:absolute; left:0; right:0; text-align:center; color:#48515c; font-size:11px; pointer-events:none; z-index:3; }
  .pgspacer{ user-select:none; pointer-events:none; }

  /* 스타일 패널 */
  #panel{ width:300px; flex:0 0 300px; background:#fff; border-left:1px solid var(--bd); overflow-y:auto; overflow-x:hidden; padding-bottom:40px; }
  #panel.hidden{ display:none; }
  #panel h3{ margin:0; padding:10px 14px; font-size:12.5px; color:var(--ui-d); background:#eef2f7; border-top:1px solid var(--bd); border-bottom:1px solid var(--bd); position:sticky; top:0; z-index:2; }
  #panel .row{ display:flex; align-items:center; gap:8px; padding:7px 14px; font-size:12.5px; color:#333; min-width:0; }
  #panel .row > *{ min-width:0; }
  #panel .row label{ flex:0 0 76px; color:#555; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #panel .row input[type=range]{ flex:1 1 0; width:0; }
  #panel .row input[type=color]{ flex:0 0 auto; width:34px; height:24px; padding:0; border:1px solid var(--bd); border-radius:4px; background:none; }
  #panel .row select{ flex:1 1 0; width:0; padding:3px 6px; border:1px solid var(--bd); border-radius:5px; font-size:12px; }
  #panel .row .val{ flex:0 0 42px; text-align:right; color:#888; }
  #panel .seg{ display:flex; flex:1 1 0; gap:4px; }
  #panel .seg button{ flex:1; padding:4px 0; font-size:12px; border:1px solid var(--bd); background:#f7f9fc; border-radius:5px; cursor:pointer; }
  #panel .seg button.on{ background:var(--ui); color:#fff; border-color:var(--ui); }
  #panel .presets{ display:flex; flex-wrap:wrap; gap:6px; padding:10px 14px; }
  #panel .presets button{ flex:1 1 44%; padding:7px 4px; font-size:12px; border:1px solid var(--bd); background:#f7f9fc; border-radius:6px; cursor:pointer; }
  #panel .hint{ padding:6px 14px 12px; font-size:11px; color:#999; line-height:1.5; }
  #panel .blkhdr{ display:flex; align-items:center; gap:8px; padding:8px 14px; }
  #panel .blkhdr .badge{ background:var(--ui); color:#fff; padding:2px 10px; border-radius:20px; font-size:11.5px; }
  #panel .blkhdr .clr{ margin-left:auto; font-size:11px; color:#c0392b; cursor:pointer; }
  #blkBody.disabled{ opacity:.4; pointer-events:none; }

  #flash{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:9999; padding:9px 16px; border-radius:8px; font-size:13px; color:#fff; box-shadow:0 3px 12px rgba(0,0,0,.3); opacity:0; transition:opacity .35s; pointer-events:none; }
  #flash.ok{ background:#2e7d32; } #flash.err{ background:#d9534f; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="title">Markdown → PDF</span>
    <label class="btn" for="upload">파일 업로드(.md)</label>
    <input type="file" id="upload" accept=".md,.markdown,.txt">
    <button onclick="loadDefault()">튜토리얼 불러오기</button>
    <button onclick="newDoc()">새 문서</button>
    <button onclick="downloadMd()">.md 다운로드</button>
    <button class="go" onclick="saveToServer()">저장(Ctrl+S)</button>
    <span class="sep"></span>
    <button onclick="saveSession()">세션 저장</button>
    <button onclick="loadSession()">세션 불러오기</button>
    <span class="sep"></span>
    <button class="go" onclick="doExport('pdf')">PDF 내보내기</button>
    <button onclick="doExport('html')">HTML</button>
    <button onclick="doExport('docx')">DOCX</button>
    <span id="busy" style="display:none;color:#ffe08a;font-size:12px">생성 중…</span>
    <span class="sep"></span>
    <button onclick="insertPageBreak()">페이지 나눔 삽입</button>
    <span class="grow"></span>
    <button onclick="toggleSource()">원본(MD)</button>
    <button onclick="togglePageView()" id="pageBtn">A4 페이지: 켬</button>
    <button onclick="togglePanel()">스타일 패널</button>
  </header>

  <main>
    <div id="srcPane">
      <div class="pane-label">원본 마크다운 — 편집하면 우측 뷰어에 실시간 반영</div>
      <textarea id="src" spellcheck="false"></textarea>
    </div>
    <div id="viewPane">
      <div class="pane-label">뷰어 — 블록을 클릭해 선택하면 우측 패널에서 그 블록만 서식을 바꿀 수 있어요 (PDF와 동일 렌더)</div>
      <div id="viewWrap"><div id="preview"><div class="toastui-editor-contents"></div></div></div>
    </div>
    <aside id="panel"></aside>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm@1.0.2/dist/turndown-plugin-gfm.js"></script>
<script>
const src = document.getElementById('src');
const contentEl = document.querySelector('#preview .toastui-editor-contents');

/* ── markdown-it: HTML 허용(인라인 스타일 div 렌더) + 소스 줄번호 ── */
const md = window.markdownit({ html:true, linkify:true });
md.core.ruler.push('source_line', state=>{
  state.tokens.forEach(t=>{
    // 최상위 블록(level 0)에만 부여 → 표/리스트/인용블록 '내부' 편집 시에도 블록 전체를 한 단위로 변환
    if(t.map && t.level===0 && (t.type.endsWith('_open') || t.type==='fence' || t.type==='hr'))
      t.attrSet('data-line', t.map[0]+':'+t.map[1]);
  });
});

/* ── 뷰어 편집 → 마크다운 역변환(turndown). 스타일 div·수식·이미지 경로 보존 ── */
const td = new TurndownService({ headingStyle:'atx', codeBlockStyle:'fenced', bulletListMarker:'-', emDelimiter:'*', hr:'---' });
td.escape = s => s;   // 과도한 백슬래시 이스케이프 비활성화(깨끗한 마크다운 유지)
if(window.turndownPluginGfm) td.use(window.turndownPluginGfm.gfm);
td.addRule('styleDiv', {
  filter: n => n.nodeName==='DIV' && n.getAttribute && n.getAttribute('style'),
  replacement: (content, node) => '\n\n<div style="'+node.getAttribute('style')+'">\n\n'+content.trim()+'\n\n</div>\n\n'
});
td.addRule('katexMath', {
  filter: n => n.classList && n.classList.contains('katex'),
  replacement: (content, node) => {
    const ann = node.querySelector('annotation[encoding="application/x-tex"]');
    const tex = ann ? ann.textContent.trim() : '';
    const disp = node.parentNode && node.parentNode.classList && node.parentNode.classList.contains('katex-display');
    return disp ? ('\n\n$$'+tex+'$$\n\n') : ('$'+tex+'$');
  }
});
td.addRule('imgOsrc', {
  filter: 'img',
  replacement: (content, node) => '!['+(node.getAttribute('alt')||'')+']('+(node.getAttribute('data-osrc')||node.getAttribute('src')||'')+')'
});

let active = 'left';      // 마지막 편집 위치
let editTimer = null;
let renderTimer=null;
function scheduleRender(){ clearTimeout(renderTimer); renderTimer=setTimeout(renderPreview, 250); }
function renderPreview(){
  contentEl.innerHTML = md.render(src.value);
  fixImages();
  markPageBreaks();
  try{ renderMathInElement(contentEl, {
    delimiters:[{left:'$$',right:'$$',display:true},{left:'\\[',right:'\\]',display:true},
                {left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}],
    throwOnError:false, ignoredTags:['script','noscript','style','textarea','pre','code'] }); }catch(e){}
  reselect();
  repaginate();
}

/* ── 이미지 자가치유 ── */
const CACHE_BUST = Date.now();
function fixImages(){
  contentEl.querySelectorAll('img').forEach(img=>{
    img.addEventListener('load', repaginate, {once:true});   // 이미지 로드로 높이 바뀌면 쪽 재계산
    const raw=(img.getAttribute('src')||'').trim();
    if(!raw || /^(data:|blob:|https?:)/i.test(raw)) return;
    if(!img.getAttribute('data-osrc')) img.setAttribute('data-osrc', raw);
    const path=raw.replace(/^\/+/,'').replace(/^files\//,'');
    img.src=location.origin+'/'+path+(path.includes('?')?'&':'?')+'v='+CACHE_BUST;
  });
}

/* ── 수동 페이지 나눔 (마커: <div class="pagebreak"></div>) ──
   마크다운 본문에 마커를 넣으면 뷰어·PDF 모두 그 지점에서 새 장이 시작된다.
   (export CSS 의 .pagebreak{break-before:page} 가 weasyprint 에서 강제 분할) */
function markPageBreaks(){
  contentEl.querySelectorAll('.pagebreak').forEach((el,i)=>{
    el.contentEditable='false';                 // 마커 자체는 편집 불가(깨짐 방지)
    el.title='클릭하면 이 페이지 나눔을 삭제합니다';
    el.onclick=ev=>{ ev.preventDefault(); ev.stopPropagation(); removePageBreakAt(i); };
  });
}
function insertPageBreak(){
  const marker='<div class="pagebreak"></div>';
  const lines=src.value.split('\n');
  let at;
  if(selLine && Number.isInteger(selLine.el)) at=Math.min(selLine.el, lines.length);   // 선택 블록 다음
  else at=src.value.slice(0, src.selectionStart||0).split('\n').length;                 // 커서가 놓인 줄 다음
  const ins=[];                                  // 앞뒤 빈 줄로 독립 HTML 블록 보장
  if(at>0 && (lines[at-1]||'').trim()!=='') ins.push('');
  ins.push(marker);
  if(at<lines.length && (lines[at]||'').trim()!=='') ins.push('');
  lines.splice(at,0,...ins);
  src.value=lines.join('\n');
  selLine=null; renderPreview(); flash('페이지 나눔 삽입');
}
function removePageBreakAt(idx){
  const lines=src.value.split('\n'); let n=-1;
  for(let i=0;i<lines.length;i++){
    if(/^\s*<div class="pagebreak"><\/div>\s*$/.test(lines[i])){
      if(++n===idx){
        lines.splice(i,1);                       // 마커 뒤 잉여 빈 줄 1개도 정리
        if((lines[i]||'').trim()==='' && (lines[i-1]||'').trim()==='') lines.splice(i,1);
        break;
      }
    }
  }
  src.value=lines.join('\n');
  selLine=null; renderPreview(); flash('페이지 나눔 삭제');
}

/* ── A4 페이지 분할(뷰어) ─────────────────────────────────────────────
   블록이 쪽 경계에 걸치면 다음 장으로 밀어 실제 시트처럼 쌓아 보여준다.
   분할 지점(블록의 소스 시작줄)을 PAGE_BREAKS 에 기록 → 내보내기 때 같은 위치에
   강제 페이지브레이크(.pagebreak)를 주입해 PDF가 뷰어와 동일하게 나뉘도록 한다. */
let PAGE_BREAKS=[];        // 새 페이지를 시작하는 블록들의 소스 시작줄(0-based)
let pgTimer=null;
const GAP_MM=6;            // 페이지 사이 회색 간격
const SAFETY=0.92;         // 뷰어 페이지 용량을 weasyprint(실제 PDF)에 맞춤(브라우저가 약간 더 담는 경향 보정)
function mm2px(v){ return v*96/25.4; }
function pageMetrics(){
  const sz=PAGES[PAGE.size]||PAGES.A4;
  const m=(PAGE.margin||'12mm 16mm 12mm 16mm').trim().split(/\s+/).map(parseFloat);
  let t,r,b,l;
  if(m.length===1){t=r=b=l=m[0];}
  else if(m.length===2){t=b=m[0];r=l=m[1];}
  else if(m.length===3){t=m[0];r=l=m[1];b=m[2];}
  else {t=m[0];r=m[1];b=m[2];l=m[3];}
  return { ph:mm2px(parseFloat(sz.h)), mt:mm2px(t), mr:mm2px(r), mb:mm2px(b), ml:mm2px(l), gap:mm2px(GAP_MM) };
}
function clearPagination(){
  contentEl.querySelectorAll('.pgspacer').forEach(s=>s.remove());
  const pv=document.getElementById('preview'); if(pv) pv.querySelectorAll('.pglabel').forEach(s=>s.remove());
  contentEl.style.background=''; contentEl.style.padding=''; contentEl.style.minHeight=''; contentEl.style.position='';
  PAGE_BREAKS=[];
}
function paginate(){
  if(!document.body.classList.contains('page-view')){ clearPagination(); return; }
  const pv=document.getElementById('preview');
  contentEl.querySelectorAll('.pgspacer').forEach(s=>s.remove());
  pv.querySelectorAll('.pglabel').forEach(s=>s.remove());
  const M=pageMetrics();
  const stride=M.ph+M.gap;
  const usable=(M.ph-M.mt-M.mb)*SAFETY;
  contentEl.style.position='relative';
  contentEl.style.padding=M.mt+'px '+M.mr+'px '+M.mb+'px '+M.ml+'px';
  contentEl.style.background=
    'repeating-linear-gradient(to bottom,'+
    '#fff 0px,#fff '+(M.ph-1)+'px,'+
    '#c5c9cf '+(M.ph-1)+'px,#c5c9cf '+M.ph+'px,'+
    'transparent '+M.ph+'px,transparent '+stride+'px)';
  PAGE_BREAKS=[];
  const blocks=[...contentEl.children].filter(b=>b.nodeType===1 && !b.classList.contains('pgspacer') && !b.classList.contains('pglabel'));
  let curPage=0;
  for(const blk of blocks){
    // 수동 페이지 나눔 마커: 이 지점(과 이후 내용)을 다음 장 맨 위로 강제 이동
    if(blk.classList && blk.classList.contains('pagebreak')){
      const t0=blk.offsetTop;
      curPage++;
      const tg=curPage*stride + M.mt, d=Math.round(tg-t0);
      if(d>0){
        const sp=document.createElement('div'); sp.className='pgspacer'; sp.contentEditable='false';
        sp.style.cssText='height:'+d+'px;margin:0;padding:0;border:0;background:none;';
        blk.parentNode.insertBefore(sp, blk);
      }
      continue;
    }
    const top=blk.offsetTop, h=blk.offsetHeight;
    const usableBottom=curPage*stride + M.mt + usable;
    if(top+h <= usableBottom+1) continue;                 // 현재 페이지에 들어감
    // 표·코드·페이지보다 큰 블록은 경계를 가로질러 흐르게 둔다(빈 공간을 채움 → 표가 앞으로 옴)
    const splittable = h>usable || blk.tagName==='TABLE' || blk.tagName==='PRE'
                       || !!(blk.querySelector && blk.querySelector('table,pre'));
    if(splittable){
      curPage=Math.max(curPage, Math.floor((top+h - M.mt)/stride));
    } else {
      // 작은 블록(문단·제목 등)만 다음 장으로 밀어 깔끔하게(경계 걸침 방지)
      curPage++;
      const target=curPage*stride + M.mt;
      const delta=Math.round(target-top);
      if(delta>0){
        const sp=document.createElement('div'); sp.className='pgspacer'; sp.contentEditable='false';
        sp.style.cssText='height:'+delta+'px;margin:0;padding:0;border:0;background:none;';
        blk.parentNode.insertBefore(sp, blk);
      }
    }
  }
  const pages=curPage+1;
  contentEl.style.minHeight=(curPage*stride + M.ph)+'px';
}
function repaginate(){ clearTimeout(pgTimer); pgTimer=setTimeout(paginate, 90); }

/* ── 블록 선택 + 개별 서식(HTML 래핑) ── */
let selLine=null;   // {sl, el} 소스 줄범위
function reselect(){
  if(!selLine){ renderBlockPanel(null); return; }
  const el=[...contentEl.querySelectorAll('[data-line]')].find(e=>+e.getAttribute('data-line').split(':')[0]===selLine.sl);
  if(el){ el.classList.add('sel-blk'); renderBlockPanel(currentBlockStyle()); }
  else { selLine=null; renderBlockPanel(null); }
}
contentEl.addEventListener('click', e=>{
  const blk=e.target.closest('[data-line]');
  contentEl.querySelectorAll('.sel-blk').forEach(x=>x.classList.remove('sel-blk'));
  if(!blk){ selLine=null; renderBlockPanel(null); return; }
  const [sl,el]=blk.getAttribute('data-line').split(':').map(Number);
  selLine={sl,el}; blk.classList.add('sel-blk');
  renderBlockPanel(currentBlockStyle());
});

/* ── 뷰어 직접 편집(글자 삭제·수정) → 편집한 블록만 부분 변환(나머지 원본 보존) ── */
contentEl.contentEditable = 'true';
contentEl.setAttribute('spellcheck','false');
let pendingBlock = null;
function caretBlock(){
  const sel=getSelection(); if(!sel.rangeCount) return null;
  let node=sel.getRangeAt(0).startContainer;
  while(node && node!==contentEl && !(node.nodeType===1 && node.hasAttribute && node.hasAttribute('data-line'))) node=node.parentNode;
  return (node && node.nodeType===1 && node.hasAttribute && node.hasAttribute('data-line')) ? node : null;
}
const isSpacer=e=> !!(e && e.classList && (e.classList.contains('pgspacer')||e.classList.contains('pglabel')));
/* Enter 로 한 블록이 여러 조각으로 쪼개지면 모두 같은 data-line 을 가짐 → 같은 줄범위의 연속 조각을 한 그룹으로 */
function groupOf(blk){
  const dl=blk.getAttribute('data-line'); const g=[blk];
  let p=blk.previousElementSibling; while(p){ if(isSpacer(p)){ p=p.previousElementSibling; continue; } if(p.getAttribute('data-line')===dl){ g.unshift(p); p=p.previousElementSibling; } else break; }
  let n=blk.nextElementSibling; while(n){ if(isSpacer(n)){ n=n.nextElementSibling; continue; } if(n.getAttribute('data-line')===dl){ g.push(n); n=n.nextElementSibling; } else break; }
  return g;
}
function saveCaret(){
  const sel=getSelection(); if(!sel.rangeCount) return null;
  const r=sel.getRangeAt(0); const blk=caretBlock(); if(!blk) return null;
  const g=groupOf(blk); let offset=0;
  for(const e of g){ if(e===blk){ const pre=r.cloneRange(); pre.selectNodeContents(blk); pre.setEnd(r.startContainer,r.startOffset); offset+=pre.toString().length; break; } offset+=e.textContent.length; }
  return { line:+g[0].getAttribute('data-line').split(':')[0], offset };
}
function placeCaret(el, off){
  let o=off, node=null, n, w=document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  while((n=w.nextNode())){ if(o<=n.length){ node=n; break; } o-=n.length; }
  try{ const r=document.createRange(); if(node) r.setStart(node, Math.min(o,node.length)); else r.selectNodeContents(el);
    r.collapse(true); const sel=getSelection(); sel.removeAllRanges(); sel.addRange(r); }catch(e){}
}
function restoreCaret(s){
  if(!s) return;
  let cur=[...contentEl.querySelectorAll('[data-line]')].find(e=>+e.getAttribute('data-line').split(':')[0]===s.line);
  if(!cur) return; let off=s.offset, last=cur;
  while(cur){
    if(isSpacer(cur)){ cur=cur.nextElementSibling; continue; }
    last=cur; const len=cur.textContent.length;
    if(off<len || !cur.nextElementSibling){ placeCaret(cur, off); return; }
    off-=len; cur=cur.nextElementSibling;
  }
  placeCaret(last, off);
}
function syncEditedBlock(){
  const blk=pendingBlock; pendingBlock=null;
  if(!blk || !blk.isConnected || !blk.getAttribute('data-line')) return;
  const g=groupOf(blk);
  const [sl,el]=g[0].getAttribute('data-line').split(':').map(Number);
  let mdBlock; try{ mdBlock=td.turndown(g.map(e=>e.outerHTML).join('\n')).trim(); }catch(e){ return; }
  let lines=src.value.split('\n');
  lines=lines.slice(0,sl).concat(mdBlock.split('\n'), lines.slice(el));
  src.value=lines.join('\n');
  scheduleAutosave();   // 미리보기 편집(삭제 포함)도 1초 후 원본에 자동 반영
  const saved=saveCaret(); renderPreview(); restoreCaret(saved);
}
function flushViewerEdits(){ if(active==='right'){ clearTimeout(editTimer); if(pendingBlock) syncEditedBlock(); active='left'; } }
contentEl.addEventListener('input', ()=>{ active='right'; selLine=null; pendingBlock=caretBlock(); clearTimeout(editTimer); editTimer=setTimeout(syncEditedBlock, 650); });

function blockRange(lines, sel){
  let s=sel.sl, e=sel.el;
  for(let i=s-1;i>=Math.max(0,s-3);i--){
    if(/^\s*<div style="/.test(lines[i])){ s=i;
      for(let j=Math.max(e-1,s);j<Math.min(lines.length,e+4);j++){ if(/<\/div>\s*$/.test(lines[j])){ e=j+1; break; } }
      break; }
  }
  return [s,e];
}
function parseWrapper(text){
  const m=text.match(/^<div style="([^"]*)">\s*([\s\S]*?)\s*<\/div>\s*$/);
  const style={};
  if(m){ m[1].split(';').forEach(d=>{ const i=d.indexOf(':'); if(i>0) style[d.slice(0,i).trim()]=d.slice(i+1).trim(); }); return {style, inner:m[2].trim()}; }
  return {style:{}, inner:text.trim()};
}
function currentBlockStyle(){
  if(!selLine) return null;
  const lines=src.value.split('\n');
  const [s,e]=blockRange(lines, selLine);
  return parseWrapper(lines.slice(s,e).join('\n').trim()).style;
}
function setBlockStyle(prop, value){
  flushViewerEdits();
  if(!selLine) return;
  let lines=src.value.split('\n');
  const [s,e]=blockRange(lines, selLine);
  const {style, inner}=parseWrapper(lines.slice(s,e).join('\n').trim());
  if(value===null || value==='' || value===undefined) delete style[prop]; else style[prop]=value;
  const decls=Object.entries(style).map(([k,v])=>`${k}:${v}`).join(';');
  const rep = decls ? `<div style="${decls}">\n\n${inner}\n\n</div>` : inner;
  lines=lines.slice(0,s).concat(rep.split('\n'), lines.slice(e));
  src.value=lines.join('\n');
  // 선택을 내부 콘텐츠 줄로 유지(래퍼 div 가 아니라) → 재선택·연속 서식 적용 가능
  const innerN=inner.split('\n').length;
  selLine = decls ? { sl:s+2, el:s+2+innerN } : { sl:s, el:s+innerN };
  renderPreview();
}
function clearBlockStyle(){
  flushViewerEdits();
  if(!selLine) return;
  let lines=src.value.split('\n');
  const [s,e]=blockRange(lines, selLine);
  const {inner}=parseWrapper(lines.slice(s,e).join('\n').trim());
  lines=lines.slice(0,s).concat(inner.split('\n'), lines.slice(e));
  src.value=lines.join('\n'); selLine={sl:s, el:s+inner.split('\n').length}; renderPreview();
}

/* ── 내보내기 ──
   PDF/HTML 은 "뷰어에 보이는 그대로" 나오도록 뷰어 DOM 을 그대로 직렬화해 weasyprint 로 렌더한다.
   (스페이서→강제 페이지브레이크, KaTeX→원본 $TeX$(서버가 codecogs 이미지화), 이미지→원본 상대경로 복원) */
function exportHTML(){
  paginate();                                   // 스페이서·분할 최신화
  const clone = contentEl.cloneNode(true);
  clone.querySelectorAll('.pglabel').forEach(x=>x.remove());
  clone.querySelectorAll('.sel-blk').forEach(x=>x.classList.remove('sel-blk'));
  // 페이지 스페이서·라벨은 화면 표시용 → 제거(weasyprint 가 자연 분할). break-inside:avoid 로 블록은 통째 유지돼 뷰어와 같은 모양.
  clone.querySelectorAll('.pgspacer').forEach(sp=>sp.remove());
  // 이미지: 캐시버스트 절대 URL → 원본 상대경로(weasyprint 가 base_url 로 해석)
  clone.querySelectorAll('img').forEach(im=>{ const o=im.getAttribute('data-osrc'); if(o) im.setAttribute('src',o); im.removeAttribute('data-osrc'); });
  // KaTeX 렌더 결과 → 원본 TeX 텍스트
  clone.querySelectorAll('.katex-display').forEach(d=>{ const a=d.querySelector('annotation[encoding="application/x-tex"]'); d.replaceWith(document.createTextNode('$$'+(a?a.textContent:'')+'$$')); });
  clone.querySelectorAll('.katex').forEach(k=>{ const a=k.querySelector('annotation[encoding="application/x-tex"]'); k.replaceWith(document.createTextNode('$'+(a?a.textContent:'')+'$')); });
  return clone.innerHTML;
}
async function doExport(fmt){
  const busy=document.getElementById('busy'); busy.style.display='inline';
  try{
    const payload={ format: fmt, markdown: src.value, vars: STYLE_VARS, pagesize: PAGE.size, margin: PAGE.margin };
    if(fmt!=='docx') payload.html = exportHTML();   // pdf/html: 뷰어 그대로. docx: pandoc(마크다운) 경로.
    const res=await fetch('/export',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)});
    if(!res.ok){ alert('내보내기 실패('+res.status+')\n'+await res.text()); return; }
    const b=await res.blob(); const a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download = fmt==='pdf'?'document.pdf':(fmt==='docx'?'document.docx':'document.html'); a.click(); URL.revokeObjectURL(a.href);
  }catch(e){ alert('오류: '+e); } finally{ busy.style.display='none'; }
}

function ctrlInit(item){
  if(item.t==='range'){
    if(item.cssOnly){ const v=getComputedStyle(document.documentElement).getPropertyValue(item.cssOnly).trim(); return v!==''?parseFloat(v):item.def; }
    const v=STYLE_VARS[item.var]; return (v!==undefined&&v!=='')?parseFloat(v):item.def;
  }
  if(item.t==='color'){ return STYLE_VARS[item.regKey||item.var] || item.def; }
  const SV=STYLE_VARS;
  switch(item.label){
    case '글꼴': return Object.keys(FONTS).find(k=>FONTS[k]===SV['--font-family']) || Object.keys(FONTS)[0];
    case '본문 정렬': return SV['--text-align'] || 'left';
    case '표 너비': return SV['--table-width'] || 'auto';
    case '이미지 정렬': return Object.keys(IMGM).find(k=>IMGM[k]===SV['--img-margin']) || 'center';
    case '용지': return PAGE.size || 'A4';
    case '여백': return Object.keys(MARG).find(k=>MARG[k]===PAGE.margin) || 'normal';
    default: { const v=SV[item.var]; return v!==undefined? v : (item.def!==undefined?item.def:item.opts[0]); }
  }
}

      const init=ctrlInit(item);
      const r=document.createElement('input'); r.type='range'; r.min=item.min; r.max=item.max; r.step=item.step; r.value=init;
      const val=document.createElement('span'); val.className='val'; const show=v=>item.fmt?item.fmt(v):(v+(item.unit||''));
      const applyR=v=>{ val.textContent=show(v); if(item.cssOnly) document.documentElement.style.setProperty(item.cssOnly,v); else setVar(item.var,v+(item.unit||'')); };
      applyR(parseFloat(init)); r.addEventListener('input',e=>applyR(parseFloat(e.target.value))); row.appendChild(r); row.appendChild(val);
    } else if(item.t==='color'){
      const init=ctrlInit(item);
      const c=document.createElement('input'); c.type='color'; c.value=init;
      const applyC=v=>item.apply?item.apply(v):setVar(item.var,v); applyC(init);
      c.addEventListener('input',e=>applyC(e.target.value)); COLOR_INPUTS[item.regKey||item.var]=c; row.appendChild(c);
    } else if(item.t==='select'){
      const s=document.createElement('select');
      item.opts.forEach((o,i)=>{ const op=document.createElement('option'); op.value=o; op.textContent=item.names?item.names[i]:o; s.appendChild(op); });
      s.value=ctrlInit(item);
      const applyS=v=>item.apply?item.apply(v):setVar(item.var,v); applyS(s.value);
      s.addEventListener('change',e=>applyS(e.target.value)); row.appendChild(s);
    }
    p.appendChild(row);
  }
  const hint=document.createElement('div'); hint.className='hint'; hint.textContent='블록 서식은 마크다운에 HTML로 기록되어 PDF에도 반영됩니다. 전역 설정은 문서 전체에 적용됩니다.'; p.appendChild(hint);
}
function applyPreset(name){ const set=PRESETS[name]; if(!set) return; for(const [k,v] of Object.entries(set)){ setVar(k,v); if(COLOR_INPUTS[k]) COLOR_INPUTS[k].value=v; } }

/* ── 편집 세션 저장/불러오기 (마크다운 + 모든 스타일 설정값 + 페이지/줌/보기) ── */
function currentZoom(){ return getComputedStyle(document.documentElement).getPropertyValue('--prev-zoom').trim()||'1'; }
async function saveSession(){
  const def = currentPath ? currentPath.replace(/\.(md|markdown|txt)$/i,'') : 'session';
  const name = prompt('세션 이름:', def); if(!name) return;
  const session = { markdown: src.value, vars: STYLE_VARS, page: { size:PAGE.size, margin:PAGE.margin },
                    zoom: currentZoom(), pageView: document.body.classList.contains('page-view'), path: currentPath };
  try{
    const res = await fetch('/save_session', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name, session})});
    if(res.ok){ const j=await res.json(); flash('세션 저장됨 · '+j.name); } else flash('세션 저장 실패 · '+await res.text(), true);
  }catch(e){ flash('세션 저장 오류 · '+e, true); }
}
async function loadSession(){
  let list; try{ list=await (await fetch('/sessions')).json(); }catch(e){ flash('목록 오류 · '+e, true); return; }
  if(!list.sessions || !list.sessions.length){ flash('저장된 세션이 없습니다.', true); return; }
  const name = prompt('불러올 세션 이름 (현재 작업은 교체됩니다):\n· '+list.sessions.join('\n· '), list.sessions[list.sessions.length-1]);
  if(!name) return;
  try{
    const res = await fetch('/load_session?name='+encodeURIComponent(name));
    if(!res.ok){ flash('불러오기 실패 · '+await res.text(), true); return; }
    applySession(await res.json()); flash('세션 불러옴 · '+name);
  }catch(e){ flash('불러오기 오류 · '+e, true); }
}
function applySession(s){
  // 스타일 변수
  for(const k of Object.keys(STYLE_VARS)) delete STYLE_VARS[k];
  Object.assign(STYLE_VARS, s.vars||{});
  for(const [k,v] of Object.entries(STYLE_VARS)) document.documentElement.style.setProperty(k,v);
  // 페이지/줌
  if(s.page){ setPageSize(s.page.size||'A4'); setPageMargin(s.page.margin||PAGE.margin); }
  if(s.zoom) document.documentElement.style.setProperty('--prev-zoom', s.zoom);
  // 페이지 보기
  const pv=!!s.pageView; document.body.classList.toggle('page-view', pv);
  document.getElementById('pageBtn').textContent='A4 페이지: '+(pv?'켬':'끔');
  // 패널 컨트롤 재구성(복원값 반영)
  buildPanel(); renderBlockPanel(null);
  // 문서
  src.value=s.markdown||''; currentPath=s.path||currentPath; selLine=null; active='left'; renderPreview();
}

buildPanel();
renderBlockPanel(null);
document.body.classList.add('page-view');
src.value='# 문서 제목\n\n좌측 **마크다운**을 편집하면 우측 뷰어(PDF와 동일 렌더)에 실시간 반영됩니다.\n\n우측 뷰어에서 문단·제목 등 **블록을 클릭**하면, 오른쪽 패널에서 그 블록만 **정렬·글자색·배경색·글씨크기·굵기**를 바꿀 수 있습니다. 변경은 마크다운에 HTML로 기록되어 PDF까지 그대로 반영됩니다.\n\n| 항목 | 값 |\n|---|---|\n| A | 1 |\n| B | 2 |\n';
renderPreview();
</script>
